<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 2 formulario</title>
</head>
<body>
    
<form action="*">

    <p>
    Selecione seu genero musical favorito:
        <br>
        <input type="radio" name="genero" value="rock" checked="checked"> Rock
        <br>
        <input type="radio" name="genero" value="pagode"> Pagode
        <br>
        <input type="radio" name="genero" value="blues"> Blues
    </p>

    <p>
        Insira seu/seus serviço de musica favorito:
        <br>
        <input type="checkbox" name="servico1" value="itunes" checked="checked"> Itunes
        <input type="checkbox" name="servico2" value="spotify" > Spotify
        <input type="checkbox" name="servico3" value="youtube music" > Youtube Music
        

    </p>    

    <p>
        Em qual dispositivo você ouve música?
        <br>
        <select name="dispositivos" id="">
            <option value="ipod">Ipod</option>
            <option value="celular">Celular</option>
            <option value="computador">Computador</option>
            <option value="radio">radio</option>
        </select>

    </p>

</form>


</body>
</html>
