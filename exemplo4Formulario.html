<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 4 formulario</title>
</head>
<body>
    
<form action="*">
    <label for="fruta_id">Fruta</label>
    <input type="text" name="fruta" id="fruta_id" list="frutas">
    <datalist id="frutas">
        <option value="Laranja" label="Laranja"></option>
        <option value="Maça" label="Maça"></option>
        <option value="Uva" label="Uva"></option>
    </datalist>
</form>

</body>
</html>
