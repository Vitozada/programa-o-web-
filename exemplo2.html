<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo 2</title>
</head>
<body>
    
    <table border=""> <!--cria tabela e coloca bordas na tabela-->
        <caption>Tabela 1 - exemplo de tags envolvendo tabelas</caption> <!--Descreve oq tem na tabela faz isso para figura tbm mas so serve para artigos-->
        <tr>
            <td colspan="4">TABELA CRIA</td>
        </tr>

        <tr>
            <th></th>
            <th>1a coluna</th>
            <th>2a coluna</th>
            <th>3a coluna</th>
        </tr>


        <tr>    <!--table row-->
            <th>1a linha</th>
            <td>10</td> <!--cria o elemento na linha-->
            <td>20</td>
            <td rowspan="2">30</td> <!--aumenta o tamanho da celula na vertical-->
        </tr>
        <tr>
            <th>2a linha</th>
            <td colspan="2">ba</td> <!--aumenta o tamanho da celula na horizontal-->
            
            
        </tr>
        <tr>
            <th>3a linha</th>
            <td>100</td>
            <td>200</td>
            <td>300</td>
        </tr>
        
    </table>

</body>
</html>
