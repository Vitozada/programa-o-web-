<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 5</title>
</head>
<body>
    
    <form action="**">

        <p>Upload de Arquivo:</p>
        <input type="file" name="arquivo-usuario" id="btn-cv"> <br>  <!-- input de arquivo -->
        <input type="submit" value="Upload">
        
    </form>

    <hr>

    <form action="**">

        <p>Pesquisa:</p>
        <input type="search" name="Pesquisa" id="btn-search" placeholder="Pesquise aqui..."> <br>  <!-- input de pesquisa -->
        <input type="submit" value="Search">
        
    </form>

    <hr>

    <form action="**">

        <input type="radio" name="" id="html" name="html" value="html">
        <label for="html">HTML</label> <br>

        
        <input type="radio" name="" id="css" name="css" value="css">
        <label for="css">CSS</label> <br>

        
        <input type="radio" name="" id="javascript" name="javascript" value="javascript">
        <label for="javascript">JavaScript</label> <br>


    </form>

    <hr>

    <form action="**">
        <label for="">Idade: <input type="text" name="user-age" id="user-age"></label> <br>
        Genero:
        <input type="radio" id="famale" name="Genero">
        <label for="famale">masculino</label>

        <input type="radio" id="male" name="Genero">
        <label for="male">Masculino</label>

        <input type="radio" name="Genero" id="trans">
        <label for="trans">Transgenero</label>

        <input type="radio" name="genero" id="nao-informado">
        <label for="nao-informado">Prefiro não informar</label>
    </form>
    
    <form action="**">
        <fieldset>
            <legend>Contato</legend>
            <label for="e-mail">E-mail: <br><input type="email" name="contact" id="e-mail"></label> <br>
            <label for="telephone">Telefone: <br> <input type="tel" name="contact" id="telephone"></label> <br>
            <label for="born-date">Nascimento: <br> <input type="date" name="contact" id="born-date"></label> <br>
        </fieldset>
    </form>

</body>
</html>
